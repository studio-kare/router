name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test src/e2e.test.ts
        env:
          E2E_BASE_URL: https://router.studiokare.nl
          PUBLIC_API_KEY: ${{ secrets.PUBLIC_API_KEY }}
